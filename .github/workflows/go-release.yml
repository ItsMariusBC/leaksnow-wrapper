name: Release leaksnow (Go)

on:
  push:
    tags:
      - "go/v*"

permissions:
  contents: write # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build, vet, test
        working-directory: go
        run: |
          echo "Releasing ${GITHUB_REF_NAME} (version ${GITHUB_REF_NAME#go/})"
          go build ./...
          go vet ./...
          go test ./... -race

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#go/}"
          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --title "leaksnow (Go) ${VERSION}" \
            --notes "Go module \`github.com/ItsMariusBC/leaksnow-wrapper/go\` ${VERSION}.

          \`\`\`
          go get github.com/ItsMariusBC/leaksnow-wrapper/go@${VERSION}
          \`\`\`"

      - name: Warm the Go module proxy (pkg.go.dev indexing)
        run: |
          VERSION="${GITHUB_REF_NAME#go/}"
          dir="$(mktemp -d)"
          cd "$dir"
          go mod init warm >/dev/null 2>&1
          # Fetching through the public proxy makes proxy.golang.org cache the
          # version and triggers pkg.go.dev indexing. Non-fatal if it lags.
          GOPROXY=https://proxy.golang.org \
            go get "github.com/ItsMariusBC/leaksnow-wrapper/go@${VERSION}" || true
