name: Go

on:
  push:
    branches: [main]
    paths: ["go/**", ".github/workflows/go.yml"]
  pull_request:
    paths: ["go/**", ".github/workflows/go.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -race
